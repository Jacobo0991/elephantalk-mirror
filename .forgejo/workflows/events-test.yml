name: Backend Events Tests

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: backend-events

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        working-directory: ElephanTalk-Backend/
        run: docker compose up -d --build fastapi-service

      - name: Wait for moderation service
        run: |
          timeout 180 bash -c '
            until curl -X POST \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"hello\"}" \
              http://localhost:8000/moderate > /dev/null 2>&1
            do
              echo "Waiting for moderation service..."
              sleep 5
            done
          '
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - working-directory: ElephanTalk-Backend/API
        run: npm ci

      - name: Unit Tests
        working-directory: ElephanTalk-Backend/API
        run: npm test -- events

      - name: E2E Tests
        working-directory: ElephanTalk-Backend/API
        run: npm run test:e2e -- events

      - name: Show compose logs
        working-directory: ElephanTalk-Backend
        if: failure()
        run: docker compose logs

      - name: Shutdown services
        working-directory: ElephanTalk-Backend
        if: always()
        run: docker compose down