name: Backend Events Tests

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: backend-events

    env:
      NODE_ENV: test
      MONGO_URI: ${{ secrets.MONGO_URI }}
      PORT: ${{ secrets.PORT }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TOXICITY_URL: ${{ secrets.TOXICITY_URL }}
      TOXICITY_THRESHOLD: ${{ secrets.TOXICITY_THRESHOLD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - working-directory: ElephanTalk-Backend/API
        run: npm ci

      - name: Unit Tests
        working-directory: ElephanTalk-Backend/API
        run: npm test -- events

      - name: E2E Tests
        working-directory: ElephanTalk-Backend/API
        run: npm run test:e2e -- events