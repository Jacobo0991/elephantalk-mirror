name: ElephanTalk CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy Application

    runs-on: [self-hosted, backend]

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Update deployment repository
        env:
          DEPLOY_FOLDER: ${{ secrets.DEPLOY_FOLDER }}
        run: |
          set -e

          cd "$DEPLOY_FOLDER"

          git fetch origin
          git reset --hard origin/main

      - name: Stop FastAPI service
        env:
          DEPLOY_FOLDER: ${{ secrets.DEPLOY_FOLDER }}
        run: |
          cd "$DEPLOY_FOLDER/ElephanTalk-Backend"

          docker compose stop fastapi-service || true
          docker compose rm -f fastapi-service || true

      - name: Clean old Docker images
        run: |
          docker image prune -af || true

      - name: Rebuild and start services
        env:
          DEPLOY_FOLDER: ${{ secrets.DEPLOY_FOLDER }}
        run: |
          cd "$DEPLOY_FOLDER/ElephanTalk-Backend"

          docker compose up -d --build

      - name: Verify deployment
        env:
          DEPLOY_FOLDER: ${{ secrets.DEPLOY_FOLDER }}
        run: |
          cd "$DEPLOY_FOLDER/ElephanTalk-Backend"

          docker compose ps

      - name: Deployment completed
        run: echo "Deployment completed."